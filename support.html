<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hỗ trợ khách hàng</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .support-box {
      background: #1e293b;
      padding: 24px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #94a3b8;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .success {
      display: none;
      text-align: center;
      color: #22c55e;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="support-box">
    <h2>Liên hệ hỗ trợ</h2>
    <form id="support-form">
      <label for="phone">Số điện thoại</label>
      <input type="text" id="phone" placeholder="Nhập số điện thoại của bạn" required>

      <label for="message">Nội dung cần hỗ trợ</label>
      <textarea id="message" placeholder="Nhập nội dung bạn cần hỗ trợ..." required></textarea>

      <button type="submit">Gửi yêu cầu</button>
      <div class="success" id="success">✅ Đã gửi yêu cầu! Nhân viên sẽ liên hệ lại sớm.</div>
    </form>
  </div>

  <script>
    document.getElementById("support-form").addEventListener("submit", function(e) {
      e.preventDefault();
      document.getElementById("success").style.display = "block";
      // Bạn có thể thêm code gửi dữ liệu về Google Sheets hoặc API ở đây
    });
  </script>

</body>
</html>
